<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D-Belief Reveal Viewer</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000000;
        color: #f4f4f5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000000;
      }

      #viewer {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000000;
      }

      .model-tab {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        height: 30px;
        padding: 0 11px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.18);
        color: #ffffff;
        font: inherit;
        font-size: 12px;
        backdrop-filter: blur(16px);
      }

      .pose-panel {
        position: fixed;
        top: 12px;
        right: 12px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: min(460px, calc(100vw - 120px));
        min-height: 30px;
        padding: 4px 7px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(8, 10, 14, 0.62);
        color: rgba(255, 255, 255, 0.86);
        font-size: 11px;
        line-height: 1.2;
        backdrop-filter: blur(16px);
      }

      .pose-status {
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .progress {
        position: fixed;
        left: 50%;
        top: 50%;
        width: min(320px, 72vw);
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        background: rgba(8, 10, 14, 0.84);
        text-align: center;
        transform: translate(-50%, -50%);
        backdrop-filter: blur(18px);
      }

      .progress progress {
        width: 100%;
        margin-top: 9px;
      }

      .progress[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="viewer"></canvas>
    <button class="model-tab" type="button">3D Belief</button>
    <div class="pose-panel" aria-label="Current viewer pose">
      <span id="pose-status" class="pose-status">zoom --</span>
    </div>
    <div id="progress" class="progress" hidden>
      <div id="progress-label">Loading Gaussian scene...</div>
      <progress id="progress-bar" max="100" value="0"></progress>
    </div>
    <script type="module" src="./embed_slider.js?v=gallery_v36_simplified_layout"></script>
  </body>
</html>
